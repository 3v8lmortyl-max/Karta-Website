name: Deploy to Netlify
on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages (pre-built static files)
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: List files to deploy
        run: ls -la

      - name: Deploy pre-built files to Netlify
        run: |
          npm install -g netlify-cli@latest
          netlify deploy \
            --dir=. \
            --site=10d14059-8b60-4d36-b982-9f9fe2683d06 \
            --prod \
            --message "Karta home skeleton - static export"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
